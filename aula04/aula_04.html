<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário de Matrícula - FATEC</title>
</head>
<body>
  <h1>Formulário de Matrícula</h1>

  <form action="/matricula" method="POST">

    <fieldset>
      <legend>Dados Pessoais</legend>

      <label for="nome">Nome completo:</label>
      <input type="text" id="nome" name="nome" required minlength="5" />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="data-nascimento">Data de nascimento:</label>
      <input type="date" id="data-nascimento" name="data_nascimento" />

      <label for="cpf">CPF:</label>
      <input type="text" id="cpf" name="cpf" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" />
    </fieldset>

    <fieldset>
      <legend>Dados Acadêmicos</legend>

      <label for="curso">Curso:</label>
      <select id="curso" name="curso">
        <option value="">Selecione...</option>
        <option value="ads">ADS</option>
        <option value="si">Sist. Informação</option>
        <option value="gestao">Gestão de TI</option>
      </select>

      <label>Período:</label>
      <label><input type="radio" name="periodo" value="manha" /> Manhã</label>
      <label><input type="radio" name="periodo" value="noite" /> Noite</label>

      <label><input type="checkbox" name="programou" value="sim" /> Já programou antes?</label>
    </fieldset>

    <label for="observacoes">Observações:</label>
    <textarea id="observacoes" name="observacoes" rows="4"></textarea>

    <label for="foto">Foto:</label>
    <input type="file" id="foto" name="foto" />

    <label for="cor">Cor favorita:</label>
    <input type="color" id="cor" name="cor" />

    <button type="submit">Enviar</button>

  </form>
</body>
</html>
